<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Pro Store - Premium Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6f0ff 0%, #ede7f6 100%);
            color: #333;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: linear-gradient(90deg, #3b0a57, #7b2cbf, #c77dff);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(59, 10, 87, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* MAIN CONTAINER */
        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        /* ADMIN PANEL */
        .admin {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(123, 44, 191, 0.1);
        }

        .admin h3 {
            color: #7b2cbf;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: flex-end;
        }

        input, select {
            padding: 12px 15px;
            border: 2px solid #e0d7f1;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #7b2cbf;
            box-shadow: 0 0 10px rgba(123, 44, 191, 0.2);
        }

        input::placeholder {
            color: #999;
        }

        /* BUTTON */
        button {
            background: linear-gradient(90deg, #5a189a, #7b2cbf);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(90, 24, 154, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-danger {
            background: #e63946;
        }

        .btn-danger:hover {
            background: #d62828;
        }

        /* CATEGORIES */
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(123, 44, 191, 0.1);
        }

        .categories button {
            padding: 10px 20px;
            border-radius: 25px;
            background: #e8dff5;
            color: #7b2cbf;
            font-weight: 600;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .categories button:hover,
        .categories button.active {
            background: linear-gradient(90deg, #5a189a, #7b2cbf);
            color: white;
            border-color: #7b2cbf;
        }

        /* PRODUCTS GRID */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(123, 44, 191, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.2);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .card h4 {
            color: #3b0a57;
            font-size: 16px;
            margin: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card p {
            color: #7b2cbf;
            font-size: 18px;
            font-weight: 700;
            margin: 10px 0;
        }

        .card-category {
            display: inline-block;
            background: #e8dff5;
            color: #7b2cbf;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card button {
            width: 100%;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* CART SIDEBAR */
        .cart {
            position: fixed;
            right: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: white;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 20px rgba(59, 10, 87, 0.2);
            margin-top: 70px;
            z-index: 50;
        }

        .cart h3 {
            color: #7b2cbf;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-empty {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        .cart-empty i {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        .cart-item {
            background: #f6f0ff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 13px;
            border-left: 4px solid #7b2cbf;
        }

        .cart-item-name {
            font-weight: 600;
            color: #3b0a57;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: #7b2cbf;
            font-weight: 700;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
        }

        .qty-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .qty-btn {
            background: #7b2cbf;
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
        }

        .qty-btn:hover {
            background: #5a189a;
        }

        .remove-btn {
            background: #e63946;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            width: 100%;
            margin-top: 5px;
        }

        .remove-btn:hover {
            background: #d62828;
        }

        .cart-divider {
            border-top: 2px solid #e0d7f1;
            margin: 15px 0;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 15px;
            background: linear-gradient(90deg, #f6f0ff, #ede7f6);
            border-radius: 10px;
        }

        .cart-total h4 {
            color: #3b0a57;
            font-size: 14px;
        }

        .cart-total span {
            color: #7b2cbf;
            font-size: 22px;
            font-weight: 700;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-size: 14px;
        }

        .clear-cart-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #999;
            font-size: 13px;
        }

        .clear-cart-btn:hover {
            background: #777;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                padding: 15px;
            }

            .cart {
                position: static;
                width: 100%;
                height: auto;
                box-shadow: 0 5px 20px rgba(123, 44, 191, 0.1);
                margin-top: 0;
                border-radius: 15px;
                margin-bottom: 20px;
            }

            .form-group {
                grid-template-columns: 1fr;
            }

            .container {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 22px;
            }

            .container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .card {
                padding: 12px;
            }

            .card img {
                height: 130px;
            }

            .categories {
                flex-wrap: wrap;
            }

            .categories button {
                padding: 8px 15px;
                font-size: 13px;
            }
        }

        /* ANIMATIONS */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card, .admin, .cart {
            animation: slideIn 0.3s ease-out;
        }

        /* SCROLLBAR */
        .cart::-webkit-scrollbar {
            width: 8px;
        }

        .cart::-webkit-scrollbar-track {
            background: #f6f0ff;
        }

        .cart::-webkit-scrollbar-thumb {
            background: #7b2cbf;
            border-radius: 4px;
        }

        .cart::-webkit-scrollbar-thumb:hover {
            background: #5a189a;
        }
    </style>
</head>

<body>
    <header>
        <h1><i class="fas fa-heart"></i> Purple Pro Store</h1>
        <p>WHERE ELEGANCE FINDS YOU</p>
    </header>

    <div class="main-container">
        <div class="content">
            <!-- ADMIN PANEL -->
            <div class="admin">
                <h3><i class="fas fa-plus-circle"></i> Add Product (Admin)</h3>
                <div class="form-group">
                    <input id="name" placeholder="Product Name" type="text">
                    <input id="price" placeholder="Price (Rs)" type="number" min="1">
                    <input id="img" placeholder="Image URL" type="url">
                    <select id="category">
                        <option value="floral">Floral</option>
                        <option value="industrial">Industrial</option>
                        <option value="luxury">Luxury</option>
                    </select>
                    <button onclick="addProduct()" style="width: auto;"><i class="fas fa-plus"></i> Add</button>
                </div>
            </div>

            <!-- CATEGORIES -->
            <div class="categories">
                <button class="active" onclick="filter('all')"><i class="fas fa-th"></i> All</button>
                <button onclick="filter('floral')"><i class="fas fa-flower"></i> Floral</button>
                <button onclick="filter('industrial')"><i class="fas fa-cog"></i> Industrial</button>
                <button onclick="filter('luxury')"><i class="fas fa-crown"></i> Luxury</button>
            </div>

            <!-- PRODUCTS -->
            <div class="container" id="products"></div>
        </div>

        <!-- CART SIDEBAR -->
        <div class="cart">
            <h3><i class="fas fa-shopping-cart"></i> Shopping Cart</h3>
            <div id="cart-items"></div>
            <div class="cart-divider"></div>
            <div class="cart-total">
                <h4>Total:</h4>
                <span>Rs <span id="total">0</span></span>
            </div>
            <button class="checkout-btn" onclick="checkout()"><i class="fas fa-whatsapp"></i> Checkout on WhatsApp</button>
            <button class="clear-cart-btn" onclick="clearCart()"><i class="fas fa-trash"></i> Clear Cart</button>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];
        let currentFilter = "all";

        // Load from localStorage on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            renderProducts();
        });

        // ADD PRODUCT
        function addProduct() {
            let name = document.getElementById("name").value.trim();
            let price = document.getElementById("price").value.trim();
            let img = document.getElementById("img").value.trim();
            let category = document.getElementById("category").value;

            if (!name || !price || !img) {
                alert("Please fill all fields!");
                return;
            }

            if (isNaN(price) || price <= 0) {
                alert("Please enter a valid price!");
                return;
            }

            products.push({
                id: Date.now(),
                name: name,
                price: Number(price),
                img: img,
                category: category
            });

            saveToStorage();
            renderProducts();

            // Clear inputs
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
            document.getElementById("img").value = "";

            alert("Product added successfully! ✨");
        }

        // FILTER
        function filter(cat) {
            currentFilter = cat;
            document.querySelectorAll(".categories button").forEach(btn => {
                btn.classList.remove("active");
            });
            event.target.classList.add("active");
            renderProducts();
        }

        // RENDER PRODUCTS
        function renderProducts() {
            let box = document.getElementById("products");
            box.innerHTML = "";

            let filtered = products.filter(p => {
                return currentFilter === "all" || p.category === currentFilter;
            });

            if (filtered.length === 0) {
                box.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No products found</h3>
                        <p>Add some products to get started!</p>
                    </div>
                `;
                return;
            }

            filtered.forEach((p, index) => {
                box.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/200?text=Product'">
                        <div class="card-category">${p.category.charAt(0).toUpperCase() + p.category.slice(1)}</div>
                        <h4>${p.name}</h4>
                        <p>Rs ${p.price}</p>
                        <button onclick="addToCart(${p.id})"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                    </div>
                `;
            });
        }

        // ADD TO CART
        function addToCart(productId) {
            let product = products.find(p => p.id === productId);
            if (!product) return;

            let cartItem = cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.qty++;
            } else {
                cart.push({
                    ...product,
                    qty: 1
                });
            }

            saveToStorage();
            renderCart();
        }

        // RENDER CART
        function renderCart() {
            let box = document.getElementById("cart-items");
            let total = 0;

            box.innerHTML = "";

            if (cart.length === 0) {
                box.innerHTML = `
                    <div class="cart-empty">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                document.getElementById("total").innerText = "0";
                return;
            }

            cart.forEach(item => {
                total += item.price * item.qty;
                box.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">Rs ${item.price}</div>
                        <div class="cart-item-qty">
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="decreaseQty(${item.id})">−</button>
                                <span style="min-width: 20px; text-align: center;">${item.qty}</span>
                                <button class="qty-btn" onclick="increaseQty(${item.id})">+</button>
                            </div>
                            <span style="color: #7b2cbf; font-weight: 700;">Rs ${item.price * item.qty}</span>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fas fa-trash-alt"></i> Remove</button>
                    </div>
                `;
            });

            document.getElementById("total").innerText = total;
        }

        // INCREASE QUANTITY
        function increaseQty(productId) {
            let item = cart.find(c => c.id === productId);
            if (item) {
                item.qty++;
                saveToStorage();
                renderCart();
            }
        }

        // DECREASE QUANTITY
        function decreaseQty(productId) {
            let item = cart.find(c => c.id === productId);
            if (item) {
                if (item.qty > 1) {
                    item.qty--;
                } else {
                    removeFromCart(productId);
                    return;
                }
                saveToStorage();
                renderCart();
            }
        }

        // REMOVE FROM CART
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveToStorage();
            renderCart();
        }

        // CLEAR CART
        function clearCart() {
            if (cart.length === 0) {
                alert("Your cart is already empty!");
                return;
            }
            if (confirm("Are you sure you want to clear the cart?")) {
                cart = [];
                saveToStorage();
                renderCart();
            }
        }

        // CHECKOUT
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            let msg = "🛍️ *Order Details:*%0A%0A";
            let total = 0;

            cart.forEach(item => {
                msg += `• ${item.name}%0A  Qty: ${item.qty} x Rs ${item.price} = Rs ${item.price * item.qty}%0A%0A`;
                total += item.price * item.qty;
            });

            msg += `━━━━━━━━━━━━━━━━━%0A`;
            msg += `*Total: Rs ${total}*%0A%0A`;
            msg += `Thank you for shopping at Purple Pro Store! 💜`;

            let phone = "923000000000"; // Change to your WhatsApp number

            window.open("https://wa.me/" + phone + "?text=" + msg, "_blank");
        }

        // STORAGE FUNCTIONS
        function saveToStorage() {
            localStorage.setItem('products', JSON.stringify(products));
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function loadFromStorage() {
            let savedProducts = localStorage.getItem('products');
            let savedCart = localStorage.getItem('cart');

            if (savedProducts) {
                products = JSON.parse(savedProducts);
            }
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }

            renderCart();
        }
    </script>
</body>
</html>
